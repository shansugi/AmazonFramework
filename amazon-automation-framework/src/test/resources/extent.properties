# extent.properties — Extent Reports adapter config for Cucumber
# Placed in src/test/resources/ — auto-detected by extent-cucumber7-adapter

# Output directory for HTML report
extent.reporter.spark.start=true
extent.reporter.spark.out=target/extent-reports/AmazonTestReport.html

# Report metadata
extent.reporter.spark.config.document.title=Amazon Automation Report
extent.reporter.spark.config.report.name=Amazon E2E Test Results
extent.reporter.spark.config.theme=DARK
extent.reporter.spark.config.encoding=UTF-8
extent.reporter.spark.config.js=
extent.reporter.spark.config.css=

# Attach screenshots automatically on failure
screenshot.dir=target/screenshots/
screenshot.rel.path=../screenshots/

# System info shown in report header
systeminfo.Environment=${env}
systeminfo.Browser=${browser}
systeminfo.OS=${os.name}
