# staging.properties — Staging / QA environment
# File: src/test/resources/config/staging.properties
# Run: mvn test -Denv=staging

base.url=https://staging.amazon.example.com

# Staging credentials — injected from CI secret store
test.email=${TEST_EMAIL}
test.password=${TEST_PASSWORD}

implicit.wait=0
explicit.wait=20
page.load.timeout=45

browser=chrome
headless=true

hub.url=http://selenium-hub:4444/wd/hub

db.url=jdbc:mysql://staging-db:3306/amazon_test
db.username=${DB_USER}
db.password=${DB_PASS}
db.pool.size=10
