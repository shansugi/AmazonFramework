# local.properties — Developer machine defaults
# File: src/test/resources/config/local.properties

# Base URL — change to amazon.com for US, amazon.co.uk for UK etc.
base.url=https://www.amazon.in

# Test account credentials
# IMPORTANT: Never commit real credentials. Use environment variables in CI.
# In CI set: export TEST_EMAIL=... and TEST_PASSWORD=...
test.email=${TEST_EMAIL:test_user@example.com}
test.password=${TEST_PASSWORD:TestPassword@123}

# Timeouts (seconds)
implicit.wait=0
explicit.wait=15
page.load.timeout=30

# Browser
browser=chrome
headless=false

# Grid (not used locally but defined so ConfigManager doesn't throw)
hub.url=http://localhost:4444/wd/hub

# DB (optional — for DB validation layer)
db.url=jdbc:mysql://localhost:3306/amazon_test
db.username=test_user
db.password=test_pass
db.pool.size=5
