name: Amazon Automation Framework

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 22 * * *'    # Nightly regression at 10pm UTC

# ─── Cancel in-progress runs when a new push to same branch comes in ─────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # SMOKE — runs on every PR, Chrome only, ~10 min
  # ═══════════════════════════════════════════════════════════════════════════
  smoke:
    name: Smoke Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    strategy:
      matrix:
        browser: [ chrome ]    # Smoke only needs Chrome
      fail-fast: false

    services:
      selenium-hub:
        image: selenium/hub:4.18.1
        ports: ["4444:4444", "4442:4442", "4443:4443"]

      chrome-node:
        image: selenium/node-chrome:4.18.1
        env:
          SE_EVENT_BUS_HOST: selenium-hub
          SE_EVENT_BUS_PUBLISH_PORT: "4442"
          SE_EVENT_BUS_SUBSCRIBE_PORT: "4443"
          SE_NODE_MAX_SESSIONS: "5"
        options: --shm-size=2gb

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Wait for Selenium Grid
        run: |
          echo "Waiting for Grid to be ready..."
          timeout 90 bash -c \
            'until curl -sf http://localhost:4444/status | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d[\"value\"][\"ready\"] else 1)"; do sleep 3; done'
          echo "Grid is ready"

      - name: Run Smoke Tests
        env:
          TEST_EMAIL:    ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: |
          mvn test \
            -Denv=staging \
            -Dbrowser=${{ matrix.browser }} \
            -Dsuite=suites/smoke-suite.xml \
            -Dheadless=true \
            -Dhub.url=http://localhost:4444/wd/hub \
            -Dthreads=5 \
            -Dcucumber.filter.tags="@smoke and @p1" \
            -Dsurefire.failIfNoSpecifiedTests=false

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-results-${{ matrix.browser }}
          path: |
            target/extent-reports/
            target/cucumber-reports/
            target/screenshots/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # DOMAIN-SPECIFIC — triggered by PR label matching team name
  # ═══════════════════════════════════════════════════════════════════════════
  domain-tests:
    name: Domain Tests (${{ matrix.module }})
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    strategy:
      matrix:
        include:
          - module: checkout
            suite: suites/checkout-suite.xml
            tag: "@checkout"
            label: checkout
          - module: auth
            suite: suites/auth-suite.xml
            tag: "@login"
            label: auth
      fail-fast: false

    services:
      selenium-hub:
        image: selenium/hub:4.18.1
        ports: ["4444:4444", "4442:4442", "4443:4443"]
      chrome-node:
        image: selenium/node-chrome:4.18.1
        env:
          SE_EVENT_BUS_HOST: selenium-hub
          SE_EVENT_BUS_PUBLISH_PORT: "4442"
          SE_EVENT_BUS_SUBSCRIBE_PORT: "4443"
          SE_NODE_MAX_SESSIONS: "3"
        options: --shm-size=2gb

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Wait for Grid
        run: timeout 90 bash -c 'until curl -sf http://localhost:4444/status; do sleep 3; done'

      - name: Run ${{ matrix.module }} tests
        if: contains(github.event.pull_request.labels.*.name, matrix.label)
        env:
          TEST_EMAIL:    ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: |
          mvn test \
            -Denv=staging \
            -Dbrowser=chrome \
            -Dsuite=${{ matrix.suite }} \
            -Dheadless=true \
            -Dhub.url=http://localhost:4444/wd/hub \
            -Dthreads=3 \
            -Dcucumber.filter.tags="${{ matrix.tag }}"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.module }}-results
          path: target/extent-reports/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # NIGHTLY REGRESSION — full suite, all browsers, parallel matrix
  # ═══════════════════════════════════════════════════════════════════════════
  regression:
    name: Nightly Regression (${{ matrix.browser }})
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'

    strategy:
      matrix:
        browser: [ chrome, firefox ]    # both browsers in parallel
      fail-fast: false                  # don't cancel Firefox if Chrome fails

    services:
      selenium-hub:
        image: selenium/hub:4.18.1
        ports: ["4444:4444", "4442:4442", "4443:4443"]

      chrome-node:
        image: selenium/node-chrome:4.18.1
        env:
          SE_EVENT_BUS_HOST: selenium-hub
          SE_EVENT_BUS_PUBLISH_PORT: "4442"
          SE_EVENT_BUS_SUBSCRIBE_PORT: "4443"
          SE_NODE_MAX_SESSIONS: "5"
        options: --shm-size=2gb

      firefox-node:
        image: selenium/node-firefox:4.18.1
        env:
          SE_EVENT_BUS_HOST: selenium-hub
          SE_EVENT_BUS_PUBLISH_PORT: "4442"
          SE_EVENT_BUS_SUBSCRIBE_PORT: "4443"
          SE_NODE_MAX_SESSIONS: "5"
        options: --shm-size=2gb

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Wait for Grid
        run: timeout 120 bash -c 'until curl -sf http://localhost:4444/status; do sleep 3; done'

      - name: Run full regression
        env:
          TEST_EMAIL:    ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          BS_USERNAME:   ${{ secrets.BS_USERNAME }}
          BS_ACCESS_KEY: ${{ secrets.BS_ACCESS_KEY }}
        run: |
          mvn test \
            -Denv=staging \
            -Dbrowser=${{ matrix.browser }} \
            -Dsuite=suites/regression-suite.xml \
            -Dheadless=true \
            -Dhub.url=http://localhost:4444/wd/hub \
            -Dthreads=10 \
            -Dcucumber.filter.tags="not @wip"

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-${{ matrix.browser }}-${{ github.run_number }}
          path: |
            target/extent-reports/
            target/cucumber-reports/
            target/screenshots/
            target/logs/
          retention-days: 30
