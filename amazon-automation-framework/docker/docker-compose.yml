version: '3.8'

# ═══════════════════════════════════════════════════════════════
# Amazon Automation Framework — Selenium Grid 4 Docker Setup
#
# LOCAL  (dev):  docker-compose up -d
# CI     (more): docker-compose -f docker-compose.yml -f docker-compose.ci.yml up -d
#
# Grid UI:   http://localhost:4444/ui
# Sessions:  http://localhost:4444/ui/#/sessions
# ═══════════════════════════════════════════════════════════════

services:

  # ─── Hub — receives WebDriver commands from tests ───────────────────────────
  selenium-hub:
    image: selenium/hub:4.18.1
    container_name: selenium-hub
    ports:
      - "4442:4442"     # event bus publish
      - "4443:4443"     # event bus subscribe
      - "4444:4444"     # WebDriver endpoint + Grid UI
    environment:
      - SE_SESSION_REQUEST_TIMEOUT=300
      - SE_SESSION_RETRY_INTERVAL=5
      - SE_GRID_MAX_SESSION=20
    healthcheck:
      test: ["CMD", "curl", "-sSf", "http://localhost:4444/status"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - grid-network

  # ─── Chrome Node — 2 replicas × 3 sessions = 6 parallel Chrome ─────────────
  chrome-node:
    image: selenium/node-chrome:4.18.1
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
    shm_size: '2gb'       # Chrome requires shared memory — without this nodes crash
    deploy:
      replicas: 2
    networks:
      - grid-network

  # ─── Firefox Node — 2 replicas × 2 sessions = 4 parallel Firefox ────────────
  firefox-node:
    image: selenium/node-firefox:4.18.1
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
      - SE_NODE_SESSION_TIMEOUT=300
    shm_size: '2gb'
    deploy:
      replicas: 2
    networks:
      - grid-network

  # ─── Edge Node — 1 replica for cross-browser edge testing ───────────────────
  edge-node:
    image: selenium/node-edge:4.18.1
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
    shm_size: '2gb'
    deploy:
      replicas: 1
    networks:
      - grid-network

networks:
  grid-network:
    driver: bridge
